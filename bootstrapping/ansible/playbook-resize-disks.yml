---
# Playbook to resize Ubuntu LVM disk after increasing vdisk size in Unraid.
# Run this after resizing the .img file in Unraid's VM manager.
#
# Assumes:
#   - Virtio disk at /dev/vda
#   - Ubuntu default LVM layout: /dev/vda3 is the LVM PV
#   - LVM VG: ubuntu-vg, LV: ubuntu-lv (mapped at /dev/mapper/ubuntu--vg-ubuntu--lv)
#
# Usage:
#   ansible-playbook -i inventory.yml playbook-resize-disks.yml
#   ansible-playbook -i inventory.yml playbook-resize-disks.yml --limit workers
- name: Resize disk partition and filesystem after vdisk expansion
  hosts: cluster
  become: true

  tasks:
    - name: Install cloud-guest-utils (provides growpart)
      ansible.builtin.apt:
        name: cloud-guest-utils
        state: present
        update_cache: false

    # Step 1: Grow partition 3 to fill the new vdisk size.
    - name: Grow LVM partition (/dev/vda3)
      ansible.builtin.command:
        cmd: growpart /dev/vda 3
      register: growpart_result
      changed_when: "'CHANGED' in growpart_result.stdout"
      failed_when:
        - growpart_result.rc != 0
        - "'NOCHANGE' not in growpart_result.stdout"

    # Step 2: Inform LVM of the enlarged physical volume.
    - name: Resize LVM physical volume
      ansible.builtin.command:
        cmd: pvresize /dev/vda3
      changed_when: true

    # Step 3: Extend the logical volume to consume all new free space.
    - name: Extend logical volume to use all free space
      ansible.builtin.command:
        cmd: lvextend -l +100%FREE /dev/mapper/ubuntu--vg-ubuntu--lv
      register: lvextend_result
      changed_when: lvextend_result.rc == 0
      failed_when:
        - lvextend_result.rc != 0
        - "'matches existing size' not in lvextend_result.stderr"

    # Step 4: Resize the ext4 filesystem to fill the logical volume.
    - name: Resize ext4 filesystem
      ansible.builtin.command:
        cmd: resize2fs /dev/mapper/ubuntu--vg-ubuntu--lv
      changed_when: true

    - name: Report new disk size
      ansible.builtin.command:
        cmd: df -h /
      register: df_result
      changed_when: false

    - name: Show disk usage
      ansible.builtin.debug:
        msg: "{{ df_result.stdout_lines }}"
